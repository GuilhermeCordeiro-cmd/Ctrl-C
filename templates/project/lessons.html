<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trituno - Lições</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/lessons.css">
</head>
<body class="page-licoes">

    <aside class="sidebar">
            <div class="logo">
                <h1>TRITUNO</h1>
            </div>
            <nav class="menu">
                <a href="#" class="active"><i class="fa-solid fa-house"></i> APRENDER</a>
                <a href="/store"><i class="fa-solid fa-shopping-cart"></i> LOJA</a>
                <a href="/settings"><i class="fa-solid fa-gear"></i> CONFIGRAÇÕES</a>
                <a href="/ranking"><i class="fa-solid fa-fire"></i> RANKING</a>
            </nav>

            <div class="user-progress">
                <p>Progresso Geral</p>
                <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%;">
                </div></div>
                <span id="progress-text" class="progress-text">0% Concluído</span>
            </div>
    </aside>
    <main class="main-content">
        <header class="top-status">

            <div class="status-item vidas">
                <i class="fa-solid fa-heart"></i>
                <span id="contador-vidas">{{usuario.vidas}}</span>
            </div>

            <div class="status-item cristais">
                <i class="fa-solid fa-gem"></i>
                <span id="contador-diamantes">{{usuario.diamantes}}</span>
            </div>
        </header>

        <section class="trilha">
            <div class="unidade-info">
                <h2>Iniciante: Teoria Musical</h2>
                <span>Módulo 1</span>
            </div>

            <nav class="caminho">
                <a href="introduction" class="node" id="node-1">
                <i class="fa-solid fa-music"></i></a>

                <a href="exercise2" class="node locked" id="node-2">
                <i class="fa-solid fa-lock"></i></a>

                <a href="exercise3" class="node locked" id="node-3">
                <i class="fa-solid fa-lock"></i></a>

                <a href="exercise4" class="node locked" id="node-4">
                <i class="fa-solid fa-lock"></i></a>
                
                <div>
                    <i class="fa-solid fa-trophy"></i>
                </div>
        </nav>
        </section>
    </main>

    <script src="/static/js/lessons.js"></script>
</body>
</html>
